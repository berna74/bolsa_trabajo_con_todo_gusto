<svg xmlns="http://www.w3.org/2000/svg" width="640" height="640" viewBox="0 0 640 640">
        <defs>
            <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#f5e6d3"/>
                <stop offset="100%" stop-color="#e8d4b8"/>
            </linearGradient>
        </defs>
        <rect width="640" height="640" fill="url(#bg)"/>
        <!-- Chef hat (toque) -->
        <ellipse cx="320" cy="80" rx="90" ry="50" fill="#ffffff"/>
        <rect x="230" y="80" width="180" height="80" fill="#ffffff"/>
        <ellipse cx="320" cy="160" rx="90" ry="40" fill="#f0f0f0"/>
        <!-- Head -->
        <circle cx="320" cy="280" r="80" fill="#d4a574"/>
        <!-- Hair (longer for woman) -->
        <path d="M240 240 Q220 200 320 160 Q420 200 400 240 Q380 260 360 280" fill="#4a3728"/>
        <path d="M240 240 Q240 320 280 340 Q320 350 360 340 Q400 320 400 240" fill="#4a3728"/>
        <!-- Eyes -->
        <circle cx="290" cy="270" r="8" fill="#1a1a1a"/>
        <circle cx="350" cy="270" r="8" fill="#1a1a1a"/>
        <circle cx="292" cy="268" r="3" fill="#ffffff"/>
        <circle cx="352" cy="268" r="3" fill="#ffffff"/>
        <!-- Eyebrows -->
        <path d="M280 260 Q290 255 300 260" stroke="#4a3728" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M340 260 Q350 255 360 260" stroke="#4a3728" stroke-width="2" fill="none" stroke-linecap="round"/>
        <!-- Nose -->
        <polygon points="320,280 315,295 325,295" fill="#b8945f"/>
        <!-- Mouth -->
        <path d="M300 315 Q320 328 340 315" stroke="#8b6f47" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- Chef coat -->
        <path d="M240 360 L240 600 L400 600 L400 360 Q400 360 320 380 Q240 360 240 360" fill="#ffffff"/>
        <rect x="240" y="360" width="160" height="10" fill="#d4a574"/>
        <!-- Chef buttons -->
        <circle cx="310" cy="420" r="5" fill="#c0a080"/>
        <circle cx="330" cy="420" r="5" fill="#c0a080"/>
        <circle cx="310" cy="480" r="5" fill="#c0a080"/>
        <circle cx="330" cy="480" r="5" fill="#c0a080"/>
        <!-- Knife -->
        <rect x="420" y="420" width="8" height="80" fill="#888888"/>
        <polygon points="428,420 438,400 428,400" fill="#c0c0c0"/>
        </svg>